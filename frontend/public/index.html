<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
  <nav class="navbar navbar-light bg-secondary-subtle w-100 position-fixed top-0 start-0 z-3">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Orchestrator</span>
    </div>
  </nav>
  <div id="chat" class="d-flex flex-column w-100 border rounded shadow-sm">
    <h6 class="text-center py-2 mb-0 border-bottom bg-white rounded-top fw-semibold text-secondary">Chat with Orchestrator</h6>
    <div id="messages" class="flex-grow-1 overflow-auto p-3"></div>
    <form id="chat-form" class="d-flex gap-2 p-3 bg-white border-top rounded-bottom">
      <input type="text" id="query" class="form-control" placeholder="Type a message..." autocomplete="off" required />
      <button type="submit" class="btn btn-primary">Send</button>
    </form>
  </div>
  <script src="/js/main.js"></script>
</body>
</html>
